repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]
        types_or: [python]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=1000]

  # Conventional Commits (OpenClaw-style), see docs/COMMIT_CONVENTION.md
  - repo: local
    hooks:
      - id: commit-msg-conventional
        name: commit message (Conventional Commits)
        entry: python scripts/validate_commit_msg.py
        language: system
        stages: [commit-msg]
        pass_filenames: true
